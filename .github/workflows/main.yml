name: Premium Feature Management Workflow

on:
  workflow_dispatch:
      inputs:
            action:
                    description: 'Action to perform'
                            required: true
                                    default: 'login'
                                            type: choice
                                                    options:
                                                              - login
                                                                        - start-feature-usage
                                                                                  - get-feature-usage
                                                                                            - stop-feature-usage
                                                                                                  feature_id:
                                                                                                          description: 'Feature ID (required for start/stop/get operations)'
                                                                                                                  required: false
                                                                                                                          type: string
                                                                                                                                username:
                                                                                                                                        description: 'Username for authentication'
                                                                                                                                                required: false
                                                                                                                                                        default: 'bhaskar'
                                                                                                                                                                type: string
                                                                                                                                                                      password:
                                                                                                                                                                              description: 'Password for authentication'
                                                                                                                                                                                      required: false
                                                                                                                                                                                              type: password
                                                                                                                                                                                                    region:
                                                                                                                                                                                                            description: 'Region (dev or test)'
                                                                                                                                                                                                                    required: false
                                                                                                                                                                                                                            default: 'dev'
                                                                                                                                                                                                                                    type: choice
                                                                                                                                                                                                                                            options:
                                                                                                                                                                                                                                                      - dev
                                                                                                                                                                                                                                                                - test
                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                jobs:
                                                                                                                                                                                                                                                                  premium-feature-management:
                                                                                                                                                                                                                                                                      runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                              steps:
                                                                                                                                                                                                                                                                                    - name: Checkout Repository
                                                                                                                                                                                                                                                                                            uses: actions/checkout@v4cho "Starting f
                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                        - name: Authenticate to Premium Feature Management
                                                                                                                                                                                                                                                                                                                if: github.event.inputs.action == 'login'
                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                  echo "Authenticating with credentials..."
                                                                                                                                                                                                                                                                                                                                            TENANT="${{ github.event.inputs.region }}"
                                                                                                                                                                                                                                                                                                                                                      USERNAME="${{ github.event.inputs.username }}"
                                                                                                                                                                                                                                                                                                                                                                PASSWORD="${{ github.event.inputs.password }}"
                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                    curl -X POST \
                                                                                                                                                                                                                                                                                                                                                                                                "https://qa-east-1.${TENANT}.api.evertz.io/authenticate/signinElement=${TENANT}" \
                                                                                                                                                                                                                                                                                                                                                                                                            -H "Content-Type: application/json" \
                                                                                                                                                                                                                                                                                                                                                                                                                        -u "${USERNAME}:${PASSWORD}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                    -d '{}' \
                                                                                                                                                                                                                                                                                                                                                                                                                                                -v
                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Start Feature Usage
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if: github.event.inputs.action == 'start-feature-usage'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
